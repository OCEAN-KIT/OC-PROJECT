language: "ko-KR"

reviews:
  profile: "chill"

  auto_review:
    enabled: true
    drafts: false
    base_branches: ["develop"]

  path_filters:
    - "!**/.next/**"
    - "!**/node_modules/**"
    - "!**/dist/**"
    - "!**/build/**"
    - "!**/coverage/**"
    - "!**/.turbo/**"
    - "!**/.cache/**"
    - "!**/.vercel/**"
    - "!**/out/**"
    - "!**/*.log"
    - "!**/*.lock"
    - "!**/pnpm-lock.yaml"
    - "!**/next-env.d.ts"
    - "!**/.DS_Store"

  path_instructions:
    # 1) 전역: 프로젝트 전반 품질/설계 기준
    - path: "**/*"
      instructions: |
        - 리뷰는 한국어로 작성.
        - 프로젝트 전반 폴더 구조/모듈 경계가 올바른지(공통 UI, 도메인별 코드, 페이지/섹션별 코드 분리) 종합적으로 평가.
        - 파일/컴포넌트 책임이 과도하면 분리 기준(응집도/결합도)으로 개선안 제시.
        - TypeScript에서 any/과도한 as 캐스팅 지양, 도메인 타입이 의미를 잘 드러내는지 확인.
        - React에서 불필요한 상태/파생 상태(derived state) 남발, useEffect로 동기화하는 패턴 남용을 지적하고 더 단순한 구조 제안.
        - 기본 성능 이슈 가능성 체크: 불필요한 리렌더링(익명 함수/객체 props, 과한 state 범위), 큰 컴포넌트 재렌더링, key 안정성, 불필요한 계산/useMemo 남발 등.

    # 2) Next.js(App Router) 기준
    - path: "src/app/**/*.ts*"
      instructions: |
        - server/client 컴포넌트 경계가 적절한지 확인.
        - "use client"가 필요한 최소 범위로 유지되는지(페이지 단 과도 사용 여부) 확인.
        - 라우팅/쿼리스트링/폼 상태 흐름이 예측 가능하고 일관적인지 확인.

    # 3) UI 컴포넌트 기준
    - path: "**/components/**/*.tsx"
      instructions: |
        - 공통 컴포넌트와 도메인 전용 컴포넌트가 섞이지 않는지(재사용/확장 관점에서 위치가 맞는지) 확인.
        - props 설계가 일관적인지(value/onChange 또는 patch setter 등), 상태 위치가 적절한지(상위/하위 이동 필요성) 확인.
        - UI는 모바일 터치/접근성(클릭 타겟, focus, overlay 닫힘 등) 기본을 만족하는지 확인.

    # 4) API/유틸 기준
    - path: "**/api/**/*.ts*"
      instructions: |
        - 네트워크 호출 규약(baseURL, credentials/headers, 에러 처리)이 일관적인지 확인.
        - UI가 raw 응답을 직접 다루지 않도록 최소한의 타입/정규화가 있는지 확인.

    - path: "**/utils/**/*.ts*"
      instructions: |
        - 유틸은 UI/도메인 의존 없이 순수하게 유지되는지 확인.
        - 예외 케이스/에러 처리(파싱 실패 등)가 기본적으로 안전한지 확인.
